---
- name: Deploy sample Nginx application
  hosts: masters
  become: true
  gather_facts: false
  vars_files:
    - ../vars/infra.yml

  tasks:
    - name: Copy sample app manifest to control plane
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../k8s/sample-app.yaml"
        dest: /home/{{ ssh_user }}/sample-app.yaml
        owner: "{{ ssh_user }}"
        group: "{{ ssh_user }}"
        mode: "0644"

    - name: Apply sample app manifest
      ansible.builtin.command: kubectl --kubeconfig=/home/{{ ssh_user }}/.kube/config apply -f /home/{{ ssh_user }}/sample-app.yaml
      register: sample_app
      changed_when: "'created' in sample_app.stdout or 'configured' in sample_app.stdout"

    - name: Wait for sample app rollout
      ansible.builtin.command: kubectl --kubeconfig=/home/{{ ssh_user }}/.kube/config rollout status deployment/nginx-deployment --timeout=180s
      changed_when: false

    - name: Show sample app URL
      ansible.builtin.debug:
        msg: "Sample app URL: http://{{ (worker_public_ips | first) | default(master_public_ip) }}:{{ sample_app_nodeport }}"
