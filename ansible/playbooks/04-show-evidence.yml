---
- name: Show evidence for LK Kubernetes screenshots
  hosts: masters
  become: false
  gather_facts: false

  tasks:
    - name: Show nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: nodes
      changed_when: false

    - name: Show pods
      ansible.builtin.command: kubectl get pods -o wide
      register: pods
      changed_when: false

    - name: Show deployments
      ansible.builtin.command: kubectl get deployments -o wide
      register: deployments
      changed_when: false

    - name: Show services
      ansible.builtin.command: kubectl get services -o wide
      register: services
      changed_when: false

    - name: Print evidence output
      ansible.builtin.debug:
        msg:
          - "kubectl get nodes -o wide"
          - "{{ nodes.stdout_lines }}"
          - "kubectl get pods -o wide"
          - "{{ pods.stdout_lines }}"
          - "kubectl get deployments -o wide"
          - "{{ deployments.stdout_lines }}"
          - "kubectl get services -o wide"
          - "{{ services.stdout_lines }}"
